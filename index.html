<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #7c5cbf, #b39ddb, #a7d8c4, #80cbc4, #c5a3cf);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        h1 {
            font-family: system-ui, sans-serif;
            font-size: 5rem;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <h1>Hello World</h1>
    <p id="dt" style="color:white;font-family:system-ui,sans-serif;font-size:1.5rem;margin-top:1rem;text-shadow:0 2px 10px rgba(0,0,0,0.2)"></p>
    <script>
        const el=document.getElementById('dt');
        const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
        setInterval(()=>{el.textContent=new Date().toLocaleString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'})+' ('+tz+')'},1000);
    </script>
</body>
</html>
